        <h2>OS MAIORES JOGADORES</h2>
        <p>A seleção brasileira sempre foi recheada de craques a nível mundial. De uns tempos pra cá isso tem sido banalizado.</p>
        </section>
<section class="galeria">
<figure>
    <img class="foto-Pele"
    src="img/foto.pele.jpg"
 alt="Brazilian football legend Pelé in a yellow jersey raising his fist in celebration while a teammate embraces him on a crowded stadium field; triumphant and joyful mood">
    <figcaption>Pelé, o Rei do Futebol, é um dos maiores jogadores da história do esporte, conhecido por sua habilidade, velocidade e visão de jogo excepcionais. Ele conquistou três Copas do Mundo com a seleção brasileira e marcou mais de mil gols em sua carreira, deixando um legado duradouro no futebol mundial.</figcaption>
</figure>
<figure>
    <img class="foto-Neymar"
    src="img/foto.ney.jpg"
 alt="Brazilian football star Neymar in a yellow jersey dribbling the ball past opponents on a vibrant stadium field; dynamic and skillful mood">
    <figcaption>Neymar, um dos maiores jogadores brasileiros da atualidade, é conhecido por sua habilidade técnica, velocidade e criatividade em campo. Ele tem sido uma peça fundamental para a seleção brasileira, contribuindo com gols e assistências em competições internacionais, e é amplamente reconhecido como um dos melhores jogadores do mundo.</figcaption>
</figure>
<figure>
    <img class="foto-Ronaldo"
    src="img/foto.fenomeno.jpeg"
 alt="Brazilian football legend Ronaldo Nazário in a yellow jersey celebrating a goal with arms raised on a packed stadium field; triumphant and iconic mood">
    <figcaption>Ronaldo Nazário, conhecido como "O Fenômeno", é um dos maiores atacantes da história do futebol. Ele se destacou por sua velocidade, habilidade de drible e precisão na finalização, conquistando dois títulos de Copa do Mundo com a seleção brasileira e deixando um legado duradouro no esporte.</figcaption>
</figure>
<figure>
    <img class="foto-Romario"
    src="img/foto.romario.jpg"
 alt="Brazilian football legend Romário in a yellow jersey celebrating a goal with arms raised on a vibrant stadium field; triumphant and charismatic mood">
    <figcaption>Romário, um dos maiores atacantes da história do futebol brasileiro, é conhecido por sua habilidade técnica, velocidade e faro de gol. Ele conquistou a Copa do Mundo de 1994 com a seleção brasileira e marcou mais de mil gols em sua carreira, deixando um legado duradouro no esporte.</figcaption>
</figure>
<figure>
    <img class="foto-Gaucho"

</figure>
<figure>

</figure>
